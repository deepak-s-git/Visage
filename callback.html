<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visage · Spotify Callback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: oklch(0.18 0.005 100);
      --parchment: oklch(0.96 0.012 95);
      --silver: oklch(0.55 0.006 100);
      --mono: 'JetBrains Mono', monospace;
    }
    html, body {
      background: var(--parchment);
      color: var(--ink);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.22em;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .callback-box {
      text-align: center;
      padding: 48px;
    }
    .callback-status {
      font-size: 9px;
      letter-spacing: 0.30em;
      text-transform: uppercase;
      color: var(--silver);
      margin-bottom: 16px;
    }
    .callback-message {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink);
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 1px solid var(--silver);
      border-top-color: var(--ink);
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .check {
      font-size: 20px;
      margin-bottom: 16px;
      display: none;
    }
    .check.visible { display: block; }
    .error { color: oklch(0.50 0.15 25); }
  </style>
</head>
<body>
  <div class="callback-box">
    <div class="spinner" id="spinner"></div>
    <div class="check" id="check">✓</div>
    <div class="callback-status" id="status">Authenticating</div>
    <div class="callback-message" id="message">Connecting to Spotify…</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');

    const spinner = document.getElementById('spinner');
    const check = document.getElementById('check');
    const status = document.getElementById('status');
    const message = document.getElementById('message');

    if (code && window.opener) {
      // Send the auth code back to the main window
      window.opener.postMessage(
        { type: 'spotify-callback', code: code },
        window.location.origin
      );

      spinner.style.display = 'none';
      check.classList.add('visible');
      status.textContent = 'Authenticated';
      message.textContent = 'Closing this window…';

      setTimeout(() => window.close(), 1200);
    } else if (error) {
      spinner.style.display = 'none';
      status.textContent = 'Failed';
      status.classList.add('error');
      message.textContent = error === 'access_denied'
        ? 'Permission denied by user'
        : 'Error: ' + error;

      setTimeout(() => window.close(), 3000);
    } else {
      spinner.style.display = 'none';
      status.textContent = 'Error';
      message.textContent = 'No authorization code received';
      setTimeout(() => window.close(), 3000);
    }
  </script>
</body>
</html>
