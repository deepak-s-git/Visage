<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visage · Spotify Callback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: oklch(0.18 0.005 100);
      --parchment: oklch(0.96 0.012 95);
      --silver: oklch(0.55 0.006 100);
      --mono: 'JetBrains Mono', monospace;
    }
    html, body {
      background: var(--parchment);
      color: var(--ink);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.22em;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .callback-box { text-align: center; padding: 48px; }
    .callback-status {
      font-size: 9px;
      letter-spacing: 0.30em;
      text-transform: uppercase;
      color: var(--silver);
      margin-bottom: 16px;
    }
    .callback-message {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink);
    }
    .spinner {
      width: 24px; height: 24px;
      border: 1px solid var(--silver);
      border-top-color: var(--ink);
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .check { font-size: 20px; margin-bottom: 16px; display: none; }
    .check.visible { display: block; }
    .error { color: oklch(0.50 0.15 25); }
  </style>
</head>
<body>
  <div class="callback-box">
    <div class="spinner" id="spinner"></div>
    <div class="check" id="check">✓</div>
    <div class="callback-status" id="status">Authenticating</div>
    <div class="callback-message" id="message">Connecting to Spotify…</div>
  </div>

  <!-- Load config to get CLIENT_ID -->
  <script src="./config.js"></script>

  <script>
    const spinner = document.getElementById('spinner');
    const check = document.getElementById('check');
    const status = document.getElementById('status');
    const message = document.getElementById('message');

    function showSuccess(msg) {
      spinner.style.display = 'none';
      check.classList.add('visible');
      status.textContent = 'Authenticated';
      message.textContent = msg || 'Closing this window…';
    }

    function showError(msg) {
      spinner.style.display = 'none';
      status.textContent = 'Failed';
      status.classList.add('error');
      message.textContent = msg;
    }

    (async function handleCallback() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const error = params.get('error');

      if (error) {
        showError(error === 'access_denied'
          ? 'Permission denied by user'
          : 'Error: ' + error);
        setTimeout(() => window.close(), 3000);
        return;
      }

      if (!code) {
        showError('No authorization code received');
        setTimeout(() => window.close(), 3000);
        return;
      }

      // Get config
      const clientId = (typeof SPOTIFY_CONFIG !== 'undefined' && SPOTIFY_CONFIG.CLIENT_ID)
        ? SPOTIFY_CONFIG.CLIENT_ID
        : null;

      if (!clientId) {
        showError('Missing config.js — cannot complete auth');
        return;
      }

      // Get the PKCE verifier stored by the main page
      const verifier = localStorage.getItem('visage_spotify_verifier');
      if (!verifier) {
        showError('Missing PKCE verifier — try connecting again');
        setTimeout(() => window.close(), 3000);
        return;
      }

      // Build redirect URI (same logic as spotify-auth.js)
      const origin = window.location.hostname === 'localhost'
        ? window.location.origin.replace('localhost', '127.0.0.1')
        : window.location.origin;
      const redirectUri = `${origin}/callback.html`;

      // Exchange the authorization code for tokens
      message.textContent = 'Exchanging token…';

      try {
        const res = await fetch('https://accounts.spotify.com/api/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({
            client_id: clientId,
            grant_type: 'authorization_code',
            code: code,
            redirect_uri: redirectUri,
            code_verifier: verifier
          })
        });

        const data = await res.json();

        if (!data.access_token) {
          showError(data.error_description || data.error || 'Token exchange failed');
          setTimeout(() => window.close(), 4000);
          return;
        }

        // Store tokens in localStorage (main page will detect this)
        localStorage.setItem('visage_spotify_token', data.access_token);
        if (data.refresh_token) {
          localStorage.setItem('visage_spotify_refresh', data.refresh_token);
        }
        localStorage.setItem(
          'visage_spotify_expiry',
          String(Date.now() + data.expires_in * 1000)
        );

        // Clean up the verifier
        localStorage.removeItem('visage_spotify_verifier');

        // Signal the main window that auth is complete
        localStorage.setItem('visage_spotify_auth_complete', Date.now().toString());

        showSuccess('Authenticated! Closing…');
        setTimeout(() => window.close(), 1200);

      } catch (err) {
        showError('Network error during token exchange');
        console.error('[Visage Callback]', err);
        setTimeout(() => window.close(), 4000);
      }
    })();
  </script>
</body>
</html>
